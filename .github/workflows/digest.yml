name: digest

on:
  schedule:
    # :00ちょうどは混雑して遅延/スキップしやすいので半端な分にする（ベストエフォート）
    - cron: "22 21 * * *"   # UTC 21:22 = JST 06:22
    - cron: "22 9 * * *"    # UTC 09:22 = JST 18:22
  workflow_dispatch: {}      # 手動実行ボタン（Actionsタブから）

permissions:
  contents: write            # 生成物と状態(seen.json)をリポジトリに書き戻すため

concurrency:
  group: digest
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 依存パッケージのインストール
        run: pip install -r requirements.txt

      - name: パイプライン実行（収集→判定→digest生成）
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TZ: Asia/Tokyo
        run: python run.py

      - name: digestを公開フォルダ(docs/)へ配置
        run: |
          mkdir -p docs
          cp outputs/digest.html docs/index.html

      - name: 生成物と状態をコミット
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs state
          git commit -m "digest update $(date -u +%FT%TZ)" || echo "変更なし"
          git push
